{% extends 'catalog/base.html' %}

{% block title %}Удаление записи - Skystore{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-lg-6 mx-auto">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h3 class="mb-0">Подтверждение удаления</h3>
                </div>
                <div class="card-body">
                    <p class="lead">Вы уверены, что хотите удалить запись "{{ post.title }}"?</p>
                    <p class="text-muted">Это действие нельзя отменить.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Да, удалить</button>
                        <a href="{% url 'blog:blog_detail' post.pk %}" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
